<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оплата прошла успешно!</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('Group 8.png') center/cover no-repeat;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 2rem; color: #00b359; margin-bottom: 15px; }
        p  { color: #666; font-size: 1.1rem; margin-bottom: 30px; }
        a  {
            background: #00b359;
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
        }
        a:hover { background: #008f47; }
    </style>
</head>
<body>
    <div class="card">
        <img src="Group 6 (6).png" alt="Логотип">
        <h1>Спасибо за пожертвование!</h1>
        <p>Деревья скоро будут посажены.<br>Вы помогаете сохранить нашу планету!</p>
        <a href="/">Вернуться на главную</a>
    </div>
</body>
</html>
